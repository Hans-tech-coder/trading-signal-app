<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Forex Signal Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>AI Forex Signal <span>Pro</span></h1>
            <p>100% Fully Automated Agent-Native Trading</p>
        </header>

        <main>
            <div class="control-panel glass">
                <div class="input-group">
                    <label for="date-input">Analysis Date</label>
                    <input type="date" id="date-input" value="2026-07-20">
                </div>
                <button id="generate-btn" class="primary-btn">Scan Market & Find Best Trade</button>
            </div>

            <div class="stats-panel glass" id="stats-panel" style="margin-bottom: 2rem;">
                <div class="stats-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h2 style="color: var(--accent); margin: 0;">Win Rate Analytics</h2>
                    <button id="refresh-stats-btn" class="secondary-btn" style="padding: 0.5rem 1rem; border-radius: 6px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; cursor: pointer;">Refresh & Evaluate</button>
                </div>
                <div class="stats-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1rem; text-align: center;">
                    <div class="stat-box" style="background: rgba(255,255,255,0.02); padding: 1rem; border-radius: 8px;">
                        <span class="label" style="display: block; font-size: 0.8rem; color: var(--text-secondary);">Win Rate</span>
                        <strong class="value" id="stat-winrate" style="font-size: 1.5rem; color: #fff;">--%</strong>
                    </div>
                    <div class="stat-box" style="background: rgba(255,255,255,0.02); padding: 1rem; border-radius: 8px;">
                        <span class="label" style="display: block; font-size: 0.8rem; color: var(--text-secondary);">Total Trades</span>
                        <strong class="value" id="stat-total" style="font-size: 1.5rem; color: #fff;">--</strong>
                    </div>
                    <div class="stat-box" style="background: rgba(255,255,255,0.02); padding: 1rem; border-radius: 8px;">
                        <span class="label" style="display: block; font-size: 0.8rem; color: var(--text-secondary);">Won</span>
                        <strong class="value text-success" id="stat-won" style="font-size: 1.5rem; color: var(--success);">--</strong>
                    </div>
                    <div class="stat-box" style="background: rgba(255,255,255,0.02); padding: 1rem; border-radius: 8px;">
                        <span class="label" style="display: block; font-size: 0.8rem; color: var(--text-secondary);">Lost</span>
                        <strong class="value text-danger" id="stat-lost" style="font-size: 1.5rem; color: var(--danger);">--</strong>
                    </div>
                </div>
                <div class="recent-trades">
                    <h3 style="font-size: 1rem; margin-bottom: 0.5rem; color: var(--text-secondary);">Recent Signals</h3>
                    <ul id="recent-trades-list" style="list-style: none; padding: 0; margin: 0; font-size: 0.9rem;">
                        <li style="color: var(--text-secondary);">Loading...</li>
                    </ul>
                </div>
            </div>

            <div class="status-panel glass hidden" id="loading-panel">
                <div class="spinner"></div>
                <p id="loading-text">Agents are gathering. This may take a minute...</p>
            </div>

            <div class="results-panel glass hidden" id="results-panel">
                <div class="signal-header">
                    <div>
                        <h2 id="signal-pair" style="color: var(--accent); margin-bottom: 5px;">EUR/USD</h2>
                        <span style="color: var(--text-secondary); font-size: 0.9rem;">Recommended Trade</span>
                    </div>
                    <span class="badge" id="signal-action">BUY</span>
                </div>
                
                <div class="signal-grid">
                    <div class="metric">
                        <span class="label">Entry</span>
                        <strong class="value" id="signal-entry">--</strong>
                    </div>
                    <div class="metric">
                        <span class="label">Take Profit</span>
                        <strong class="value text-success" id="signal-tp">--</strong>
                    </div>
                    <div class="metric">
                        <span class="label">Stop Loss</span>
                        <strong class="value text-danger" id="signal-sl">--</strong>
                    </div>
                </div>

                <div class="reasoning-box">
                    <h3>AI Reasoning</h3>
                    <p id="signal-reasoning">...</p>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
